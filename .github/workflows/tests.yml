name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (container unit + integration tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run pytest
        env:
          # Avoid ChromaDB telemetry / network calls during CI
          ANONYMIZED_TELEMETRY: "false"
          # Harness connectivity shouldn't be attempted in CI
          GLADOS_TEST_BATTERY_DISABLE_LIVE: "1"
          # Redirect writable paths away from the container-style
          # `/app/...` defaults — GitHub runners can't mkdir /app.
          # Import-time side effects in tts_ui.py create these dirs.
          GLADOS_ROOT: "/tmp/glados-app"
          GLADOS_AUDIO: "/tmp/glados-app/audio_files"
          GLADOS_DATA: "/tmp/glados-app/data"
          GLADOS_LOGS: "/tmp/glados-app/logs"
        run: |
          mkdir -p /tmp/glados-app/audio_files /tmp/glados-app/data /tmp/glados-app/logs
          pytest -q --tb=short

      - name: Report summary
        if: always()
        run: |
          echo "::group::Test Summary"
          if [ -f .pytest_cache/lastfailed ]; then
            echo "Failed tests from previous run:"
            cat .pytest_cache/lastfailed
          else
            echo "No cached failures."
          fi
          echo "::endgroup::"
