name: Snyk Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

# Both scans report to Snyk org b905c516-c213-433b-973a-9d26adf03871.
# SNYK_TOKEN is a Snyk API token (legacy UUID format) stored as a GitHub
# Actions secret at the repository level. Rotate in the Snyk UI when needed.
# The snyk/actions/* containers use an older CLI that does not accept the
# newer snyk_uat.* PAT format — use the legacy UUID token from
# Snyk UI -> Account settings -> Auth Token.

jobs:
  snyk-python:
    name: Snyk Python (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api]"

      - name: Freeze installed packages to requirements.txt
        # snyk/actions/python uses Poetry's resolver on PEP 621 pyproject.toml
        # by default, which can't handle unbounded Python version ranges.
        # Exporting the actually-installed versions to requirements.txt lets
        # Snyk use pip's resolver instead, which is the correct tool here.
        run: pip freeze > requirements.txt

      - name: Run Snyk Python scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --org=b905c516-c213-433b-973a-9d26adf03871 --severity-threshold=high --file=requirements.txt --package-manager=pip

  snyk-docker:
    name: Snyk Docker (container scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: glados:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Snyk Docker scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: glados:scan
          args: --org=b905c516-c213-433b-973a-9d26adf03871 --severity-threshold=high --file=Dockerfile
