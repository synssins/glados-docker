name: Snyk Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

# Both scans report to Snyk org b905c516-c213-433b-973a-9d26adf03871.
# SNYK_TOKEN is a Snyk auth token stored as a GitHub Actions secret at
# the repository level. We install the Snyk CLI via npm rather than using
# snyk/actions/* containers — the container actions shipped broken quoting
# of --flag arguments and inconsistent auth handling, while the CLI is
# well-behaved and stays current.

env:
  SNYK_ORG: b905c516-c213-433b-973a-9d26adf03871

jobs:
  snyk-python:
    name: Snyk Python (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api]"

      - name: Freeze installed packages
        run: pip freeze > requirements.txt

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk auth
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth "$SNYK_TOKEN"

      - name: Snyk test (Python, pip manifest)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --severity-threshold=high \
            --org="$SNYK_ORG"

  snyk-docker:
    name: Snyk Docker (container scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: glados:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk auth
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth "$SNYK_TOKEN"

      - name: Snyk container test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk container test glados:scan \
            --file=Dockerfile \
            --severity-threshold=high \
            --org="$SNYK_ORG"
