name: Snyk Security Scan

# Paused 2026-04-19: Snyk monthly scan budget is tight. Automatic
# push/PR/weekly triggers are disabled; run the scan manually on
# milestone commits via the Actions tab (Run workflow) or:
#   gh workflow run snyk.yml --ref main
# Re-enable the `push` / `pull_request` / `schedule` blocks when the
# budget refreshes if continuous scanning is desired again.
on:
  workflow_dispatch:

# Both scans report to Snyk org b905c516-c213-433b-973a-9d26adf03871.
# SNYK_TOKEN is a Snyk auth token stored as a GitHub Actions secret. We
# install Snyk CLI via npm and write the token to config via
# `snyk config set api=`, which bypasses the CLI's OAuth auth flow.

env:
  SNYK_ORG: b905c516-c213-433b-973a-9d26adf03871

jobs:
  snyk-python:
    name: Snyk Python (SCA)
    runs-on: ubuntu-latest
    # continue-on-error so the operator sees every finding (including
    # LOW/MEDIUM) in the logs and downloadable report, even when HIGH+
    # CVEs are present. The Snyk dashboard is the authoritative view;
    # this job exists to surface changes in CI.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api]"

      - name: Freeze installed packages
        run: pip freeze > requirements.txt

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Configure Snyk auth
        env:
          SNYK_API_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk config set api="$SNYK_API_TOKEN"

      - name: Snyk test (Python, pip manifest)
        # No --severity-threshold so every severity level is reported.
        # JSON report uploaded as artifact below for offline review.
        run: |
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --org="$SNYK_ORG" \
            --json-file-output=snyk-python-report.json \
          || true

      - name: Upload Snyk Python report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-python-report
          path: snyk-python-report.json
          if-no-files-found: warn

  snyk-docker:
    name: Snyk Docker (container scan)
    runs-on: ubuntu-latest
    # continue-on-error: the Debian 13 base image ships with known
    # unpatched HIGH/CRITICAL CVEs (fix_deferred upstream). Making the
    # scan non-blocking means every push surfaces the current picture
    # in logs + artifact, and CI stays green on the parts we control.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: glados:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Configure Snyk auth
        env:
          SNYK_API_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk config set api="$SNYK_API_TOKEN"

      - name: Snyk container test
        # --policy-path: `snyk container test` does NOT pick up `.snyk` by
        # default (unlike `snyk test` for SCA). Passing it explicitly so
        # committed suppressions apply to the container scan too.
        # No --severity-threshold so every severity is reported. JSON
        # report uploaded as artifact below.
        run: |
          snyk container test glados:scan \
            --file=Dockerfile \
            --policy-path=.snyk \
            --org="$SNYK_ORG" \
            --json-file-output=snyk-container-report.json \
          || true

      - name: Upload Snyk container report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-container-report
          path: snyk-container-report.json
          if-no-files-found: warn
