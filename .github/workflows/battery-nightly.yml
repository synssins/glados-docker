name: Battery (self-hosted, manual dispatch only)

# Runs the private 435-row GLaDOS battery against the deployed container
# on the operator's LAN via a self-hosted runner (`glados-lan` label).
# Cloud runners can't reach LAN hosts; only the self-hosted agent can.
# Host addresses come from GitHub Actions secrets — never hard-coded.
#
# MANUAL DISPATCH ONLY — no cron. The battery flips real physical
# lights and switches in an occupied household; running it on a
# schedule (especially overnight) would wake residents. The operator
# triggers it when they're awake, aware the lights will flicker, and
# ready to interpret results. Previous cron at 02:00 Central removed
# 2026-04-21.
#
# All steps use `shell: powershell` (Windows PowerShell 5.1, always
# present on AIBox). `shell: bash` maps to WSL on Windows and WSL
# isn't installed on AIBox. Complex logic lives in helper Python
# scripts under `scripts/ci/` so the YAML stays readable and the
# logic is unit-testable outside of CI.

on:
  workflow_dispatch:
    inputs:
      max_tests:
        description: 'Max tests (default 50 sanity subset; 0 or blank for full 435)'
        required: false
        default: '50'
      start_idx:
        description: 'Starting row idx'
        required: false
        default: '0'

permissions:
  contents: read

jobs:
  battery:
    name: Run battery
    runs-on: [self-hosted, glados-lan]
    timeout-minutes: 60

    env:
      # All host addresses come from GitHub Actions secrets/vars so the
      # operator's LAN topology isn't committed to the repo. Required
      # secrets: HA_URL, HA_TOKEN, GLADOS_API_URL, GLADOS_SSH_HOST,
      # GLADOS_SSH_PASSWORD. Required vars: GLADOS_HARNESS_DIR.
      HA_URL: ${{ secrets.HA_URL }}
      HA_TOKEN: ${{ secrets.HA_TOKEN }}
      GLADOS_API: ${{ secrets.GLADOS_API_URL }}/v1/chat/completions
      GLADOS_TEST_HARNESS_URL: ${{ secrets.GLADOS_API_URL }}/api/test-harness/noise-patterns
      GLADOS_SSH_HOST: ${{ secrets.GLADOS_SSH_HOST }}
      GLADOS_SSH_USER: root
      GLADOS_SSH_PASSWORD: ${{ secrets.GLADOS_SSH_PASSWORD }}
      PYTHONIOENCODING: utf-8
      MAX_TESTS: ${{ inputs.max_tests || '50' }}
      START_IDX: ${{ inputs.start_idx || '0' }}
      HARNESS_DIR: ${{ vars.GLADOS_HARNESS_DIR }}

    steps:
      - name: Checkout container repo
        uses: actions/checkout@v4

      - name: Check deploy is reachable
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "--- noise-patterns endpoint ---"
          $resp = Invoke-RestMethod -Uri $env:GLADOS_TEST_HARNESS_URL -TimeoutSec 10
          $resp | ConvertTo-Json
          Write-Host "--- HA reachable ---"
          $headers = @{ "Authorization" = "Bearer $env:HA_TOKEN" }
          Invoke-RestMethod -Uri "$env:HA_URL/api/" -Headers $headers -TimeoutSec 10 | Out-Null
          Write-Host "HA reachable: OK"

      - name: Install harness deps
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install paramiko pyyaml

      - name: Run battery subset
        shell: powershell
        run: |
          python scripts\ci\run_battery.py `
            --harness-dir "$env:HARNESS_DIR" `
            --max-tests $env:MAX_TESTS `
            --start-idx $env:START_IDX

      - name: Summarise results
        if: always()
        shell: powershell
        run: |
          python scripts\ci\summarise_battery.py `
            --results "$env:HARNESS_DIR\results.json"

      - name: Upload results artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: battery-results-${{ github.run_number }}
          path: |
            C:\src\glados-test-battery\results.json
            C:\src\glados-test-battery\harness.log
          retention-days: 30

      - name: Fail on low pass rate
        shell: powershell
        run: |
          python scripts\ci\tripwire_battery.py `
            --results "$env:HARNESS_DIR\results.json"
