name: Battery (self-hosted, nightly)

# Runs the private 435-row GLaDOS battery against the deployed container
# on 10.0.0.50 + the HA instance on 10.0.0.20 via a self-hosted
# runner on AIBox (`glados-lan` label). Cloud runners can't reach those
# IPs; only the AIBox agent can.
#
# Schedule: 07:00 UTC = 02:00 America/Chicago (post-midnight, pre-morning).
# Also exposes a manual dispatch button so the operator can kick a run
# on demand from the Actions tab.

on:
  schedule:
    - cron: '0 7 * * *'   # 02:00 America/Chicago (UTC-5 CDT)
  workflow_dispatch:
    inputs:
      max_tests:
        description: 'Max tests (default 50 sanity subset; leave blank for full 435)'
        required: false
        default: '50'
      start_idx:
        description: 'Starting row idx'
        required: false
        default: '0'

permissions:
  contents: read

jobs:
  battery:
    name: Run battery (${{ inputs.max_tests || '50 (scheduled)' }})
    runs-on: [self-hosted, glados-lan]
    timeout-minutes: 60

    env:
      HA_URL: http://10.0.0.20:8123
      HA_TOKEN: ${{ secrets.HA_TOKEN }}
      GLADOS_API: http://10.0.0.50:8015/v1/chat/completions
      GLADOS_TEST_HARNESS_URL: http://10.0.0.50:8015/api/test-harness/noise-patterns
      GLADOS_SSH_HOST: 10.0.0.50
      GLADOS_SSH_USER: root
      GLADOS_SSH_PASSWORD: ${{ secrets.GLADOS_SSH_PASSWORD }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout container repo
        uses: actions/checkout@v4

      - name: Check deploy is reachable
        shell: bash
        run: |
          curl -sSf --max-time 10 http://10.0.0.50:8015/api/test-harness/noise-patterns > /tmp/noise.json
          cat /tmp/noise.json
          curl -sSf --max-time 10 -H "Authorization: Bearer $HA_TOKEN" http://10.0.0.20:8123/api/ > /dev/null && echo "HA reachable"

      - name: Install harness deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install paramiko pyyaml

      - name: Run battery subset
        id: battery
        shell: bash
        working-directory: C:\src\glados-test-battery
        run: |
          MAX_ARG=""
          if [ -n "${{ inputs.max_tests }}" ]; then
            MAX_ARG="--max ${{ inputs.max_tests }}"
          fi
          START_ARG=""
          if [ -n "${{ inputs.start_idx }}" ]; then
            START_ARG="--start-idx ${{ inputs.start_idx }}"
          fi
          # Rotate results to a per-run file so nightly doesn't clobber
          # the operator's on-disk history.
          python -c "
          import json, os, sys, time
          sys.path.insert(0, '.')
          from harness import run
          run(max_tests=int('${{ inputs.max_tests }}' or '50'),
              start_idx=int('${{ inputs.start_idx }}' or '0'))
          "

      - name: Summarise results
        if: always()
        shell: bash
        working-directory: C:\src\glados-test-battery
        run: |
          python -c "
          import json
          with open('results.json', encoding='utf-8') as f:
              data = json.load(f)
          rows = data.get('rows', [])
          by = {}
          for r in rows:
              by[r['pass_fail']] = by.get(r['pass_fail'], 0) + 1
          total = len(rows)
          print(f'Total: {total}')
          for k, v in sorted(by.items()):
              pct = (v / total * 100) if total else 0
              print(f'  {k}: {v} ({pct:.1f}%)')
          # Emit GitHub step summary
          import os
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary_path:
              with open(summary_path, 'a', encoding='utf-8') as f:
                  f.write(f'## Battery Results\n\n')
                  f.write(f'| Disposition | Count | % |\n|---|---:|---:|\n')
                  for k, v in sorted(by.items()):
                      pct = (v / total * 100) if total else 0
                      f.write(f'| {k} | {v} | {pct:.1f}% |\n')
                  f.write(f'\n**Total:** {total} tests\n')
          "

      - name: Upload results artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: battery-results-${{ github.run_number }}
          path: |
            C:\src\glados-test-battery\results.json
            C:\src\glados-test-battery\harness.log
          retention-days: 30

      - name: Fail on low pass rate
        shell: bash
        working-directory: C:\src\glados-test-battery
        run: |
          python -c "
          import json, sys
          with open('results.json', encoding='utf-8') as f:
              data = json.load(f)
          rows = data.get('rows', [])
          if not rows:
              print('::warning ::no rows in results.json')
              sys.exit(0)
          passed = sum(1 for r in rows if r['pass_fail'] in ('PASS', 'QUERY_OK'))
          rate = passed / len(rows)
          print(f'pass rate: {rate:.2%}')
          # Baseline 2026-04-20: 55.9%. Phase 8.x improvements should
          # have lifted this. Tripwire set conservatively at 45% so
          # normal fluctuations don't alarm; catastrophic regressions do.
          if rate < 0.45:
              print(f'::error ::pass rate {rate:.1%} below 45% tripwire')
              sys.exit(1)
          "
