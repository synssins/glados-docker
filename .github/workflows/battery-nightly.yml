name: Battery (self-hosted, nightly)

# Runs the private 435-row GLaDOS battery against the deployed container
# on 10.0.0.50 + the HA instance on 10.0.0.20 via a self-hosted
# runner on AIBox (`glados-lan` label). Cloud runners can't reach those
# IPs; only the AIBox agent can.
#
# Schedule: 07:00 UTC = 02:00 America/Chicago (post-midnight, pre-morning).
# Also exposes a manual dispatch button so the operator can kick a run
# on demand from the Actions tab.
#
# All steps use `shell: powershell` (Windows PowerShell 5.1, always
# present on AIBox). `shell: bash` maps to WSL on Windows and WSL
# isn't installed on AIBox. Complex logic lives in helper Python
# scripts under `scripts/ci/` so the YAML stays readable and the
# logic is unit-testable outside of CI.

on:
  schedule:
    - cron: '0 7 * * *'   # 02:00 America/Chicago (UTC-5 CDT)
  workflow_dispatch:
    inputs:
      max_tests:
        description: 'Max tests (default 50 sanity subset; 0 or blank for full 435)'
        required: false
        default: '50'
      start_idx:
        description: 'Starting row idx'
        required: false
        default: '0'

permissions:
  contents: read

jobs:
  battery:
    name: Run battery
    runs-on: [self-hosted, glados-lan]
    timeout-minutes: 60

    env:
      HA_URL: http://10.0.0.20:8123
      HA_TOKEN: ${{ secrets.HA_TOKEN }}
      GLADOS_API: http://10.0.0.50:8015/v1/chat/completions
      GLADOS_TEST_HARNESS_URL: http://10.0.0.50:8015/api/test-harness/noise-patterns
      GLADOS_SSH_HOST: 10.0.0.50
      GLADOS_SSH_USER: root
      GLADOS_SSH_PASSWORD: ${{ secrets.GLADOS_SSH_PASSWORD }}
      PYTHONIOENCODING: utf-8
      MAX_TESTS: ${{ inputs.max_tests || '50' }}
      START_IDX: ${{ inputs.start_idx || '0' }}
      HARNESS_DIR: C:\src\glados-test-battery

    steps:
      - name: Checkout container repo
        uses: actions/checkout@v4

      - name: Check deploy is reachable
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "--- noise-patterns endpoint ---"
          $resp = Invoke-RestMethod -Uri $env:GLADOS_TEST_HARNESS_URL -TimeoutSec 10
          $resp | ConvertTo-Json
          Write-Host "--- HA reachable ---"
          $headers = @{ "Authorization" = "Bearer $env:HA_TOKEN" }
          Invoke-RestMethod -Uri "$env:HA_URL/api/" -Headers $headers -TimeoutSec 10 | Out-Null
          Write-Host "HA reachable: OK"

      - name: Install harness deps
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install paramiko pyyaml

      - name: Run battery subset
        shell: powershell
        run: |
          python scripts\ci\run_battery.py `
            --harness-dir "$env:HARNESS_DIR" `
            --max-tests $env:MAX_TESTS `
            --start-idx $env:START_IDX

      - name: Summarise results
        if: always()
        shell: powershell
        run: |
          python scripts\ci\summarise_battery.py `
            --results "$env:HARNESS_DIR\results.json"

      - name: Upload results artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: battery-results-${{ github.run_number }}
          path: |
            C:\src\glados-test-battery\results.json
            C:\src\glados-test-battery\harness.log
          retention-days: 30

      - name: Fail on low pass rate
        shell: powershell
        run: |
          python scripts\ci\tripwire_battery.py `
            --results "$env:HARNESS_DIR\results.json"
