# GLaDOS log groups — operator-tunable per-subsystem logging.
#
# This file is the persistent state for the per-group log filter (see
# glados/observability/log_groups.py). The WebUI Logging page reads and
# writes this file; you can also edit it directly here.
#
# default_level
#   Floor for log calls that have no group binding (legacy logger.info()
#   calls). Records below this level are dropped before the per-group
#   filter runs. Loguru levels (low → high): DEBUG, INFO, SUCCESS,
#   WARNING. ERROR / CRITICAL bypass filtering entirely.
#
# groups[]
#   id            stable machine ID — must match a builtin group from
#                 glados/observability/log_groups.py. Unknown IDs are
#                 dropped on load with a warning.
#   name          human-readable display name (UI only).
#   description   one-line tooltip (UI only).
#   category      top-level group for UI bucketing.
#   enabled       per-group on/off.
#   level         per-group threshold. Same level set as default_level.
#
# Hot-reload
#   Changes saved here (via the WebUI page or a direct edit + container
#   restart) take effect immediately for the WebUI write path. A direct
#   file edit does NOT auto-reload — flip a single toggle in the WebUI
#   to pick up your changes, or restart the container.
#
# Locked-on groups
#   The auth.audit group cannot be disabled via this file or the WebUI.
#   That's intentional — silencing audit events is a security-control
#   change that needs a code-level deviation, not a config edit.
#
# Global override
#   The GLADOS_LOG_LEVEL env var, if set, lowers every group's effective
#   floor to that level for the lifetime of the process. Useful for
#   one-shot deployments where you want the firehose without flipping
#   ~40 toggles. e.g. `GLADOS_LOG_LEVEL=DEBUG`.

default_level: SUCCESS
