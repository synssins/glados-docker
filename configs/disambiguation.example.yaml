# Tier 2 disambiguation rules — copy to disambiguation.yaml on the
# container's mounted /app/configs/ to override defaults.
#
# These rules become part of the LLM's system prompt every time Tier 1
# misses and Tier 2 takes over. Edits are reloaded on container
# restart (no hot-reload yet).

# Operator naming convention. Free-form; rendered into the prompt
# verbatim. Help the LLM map house slang to entity selection.
naming_convention:
  "lamp / lamps":     "plug-in fixtures or smart bulbs"
  "light / lights":   "overhead fixtures (plural = all of them in scope)"
  "switch / switches": "physical wall switches"
  "strip / strips":   "LED strip lights"
  "scene":            "named lighting/automation scene"

# Words that always mean "the ceiling fixture", overriding the generic
# "lights" group.
overhead_synonyms:
  - overhead
  - ceiling
  - ceiling light
  - ceiling fixture

# Whether to filter candidates by current state when the action implies
# a transition (turn_off → only consider 'on'; turn_on → only 'off').
state_inference: true

# Skip state-based inference if any candidate's state hasn't been
# refreshed from HA in this many seconds — stale state would cause
# wrong-device outcomes.
max_state_age_seconds: 5.0

# Top-N fuzzy candidates to pass to the LLM. More candidates = better
# context but slower LLM call.
candidate_limit: 12

# Free-form text appended to the system prompt. Use for site-specific
# quirks — e.g. "the office lights are unreliable, prefer the desk lamp".
extra_guidance: ""

# Phase 8.1 — Candidate scoring controls (WebUI: Integrations → Home
# Assistant → "Disambiguation rules" card).
#
# Opposing-token pairs: if the utterance contains one side of a pair
# and a candidate's entity name contains the other, the candidate's
# rank score is penalized by 50 points. Prevents "upstairs lights"
# from picking a downstairs fixture just because it scored well on
# the other tokens. Leave empty to use the shipped defaults
# (upstairs↔downstairs, lower↔upper, front↔back, inside↔outside,
# indoor↔outdoor, master↔guest, left↔right, top↔bottom,
# primary↔secondary, north↔south, east↔west). An explicit empty list
# here disables the penalty entirely.
opposing_token_pairs: []
  # - [upstairs, downstairs]
  # - [kids, master]            # add house-specific pairs here

# Twin dedup: Zooz / Inovelli dimmers expose both `light.foo` and
# `switch.foo` for a single physical relay. When both show up as
# candidates for the same device_id, keep the `light.*` side (only
# domain that honors brightness_pct). Inovelli fan/light edge case
# where `light.*` has `supported_color_modes=['onoff']` is handled
# automatically — the switch wins there.
twin_dedup: true

# Phase 8.2 — Precheck expansion (WebUI: Personality → "Command
# recognition" card).
#
# `looks_like_home_command` triggers Tier 1/2 when an utterance carries
# home-automation intent. Shipped defaults cover ~28 action verbs
# (darken, brighten, dim, bump, lower, raise, reduce, increase, …) and
# a handful of ambient-state regex patterns ("it's too dark", "time to
# read", "I want more light"). The fields below let operators add
# house-specific extras without editing code. They're ADDITIVE — the
# shipped defaults stay on even when these are empty.
extra_command_verbs: []
  # - nudge
  # - tickle

# Regex strings. Case-insensitive. Use raw patterns; invalid ones are
# logged at startup and skipped (so one bad edit doesn't break the
# entire precheck).
extra_ambient_patterns: []
  # - "\\bthe cats? (?:need|want)\\b"
