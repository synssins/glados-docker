# GLaDOS Container — Example Configuration
# Copy this to config.yaml and fill in your values.
# config.yaml is gitignored and will never be committed.
# This file (config.example.yaml) IS committed — keep it free of real values.

# ---------------------------------------------------------------------------
# Home Assistant
# ---------------------------------------------------------------------------
home_assistant:
  url: "http://YOUR_HA_IP:8123"
  ws_url: "ws://YOUR_HA_IP:8123/api/websocket"
  token: "YOUR_LONG_LIVED_HA_TOKEN"

# ---------------------------------------------------------------------------
# External service URLs — GLaDOS calls these; it does NOT host them.
# Run Ollama and speaches wherever you like (host-native, another compose
# stack, another machine) and point at their URLs here. The env vars in
# .env override these values at runtime.
# ---------------------------------------------------------------------------
services:
  ollama_interactive:
    url: "http://host.docker.internal:11434"
  ollama_autonomy:
    url: "http://host.docker.internal:11436"       # separate instance if available
  ollama_vision:
    url: "http://host.docker.internal:11435"       # separate instance if available
  speaches:
    url: "http://host.docker.internal:8800"
    # Voice identifier registered in YOUR speaches instance. Until the
    # GLaDOS Kokoro voice is registered (Stage 4 work), use any stock
    # speaches voice — character is preserved by the LLM system prompt.
    tts_voice: "glados"
    tts_model: "hexgrad/Kokoro-82M"
    stt_model: "Systran/faster-whisper-small"
  chromadb:
    # In-compose service — GLaDOS's dedicated memory store.
    url: "http://chromadb:8000"

# ---------------------------------------------------------------------------
# Network — used for serving audio files back to HA media players
# ---------------------------------------------------------------------------
network:
  serve_host: "YOUR_AIBOX_IP"       # IP reachable by HA
  serve_port: 5051

# ---------------------------------------------------------------------------
# Auth — WebUI login
# ---------------------------------------------------------------------------
auth:
  enabled: true
  session_timeout_hours: 24
  # Password hash set via: docker exec glados python -m glados.tools.set_password

# ---------------------------------------------------------------------------
# Discord (optional — leave blank to disable)
# ---------------------------------------------------------------------------
discord:
  bot_token: ""
  active_channels: []
  alert_channel: ""
  allowed_user_ids: []

# ---------------------------------------------------------------------------
# GLaDOS API — which port the persona layer listens on
# ---------------------------------------------------------------------------
api:
  host: "0.0.0.0"
  port: 8015

# ---------------------------------------------------------------------------
# WebUI
# ---------------------------------------------------------------------------
webui:
  host: "0.0.0.0"
  port: 8052
  ssl:
    enabled: false
    cert_path: "/app/certs/cert.pem"
    key_path: "/app/certs/key.pem"
    # Let's Encrypt via DNS-01 challenge — no inbound port exposure required.
    # DNS-01 verifies domain ownership via a TXT record in your DNS zone.
    # Your DNS provider must support API-based record creation/deletion.
    # Set provider credentials in .env (never commit real values).
    # Options for ACME sidecar: adferrand/lego-auto, certbot + DNS plugin, Caddy.
    # Self-signed certs are an alternative for air-gapped/fully-local installs.
    domain: ""   # e.g. glados.home.yourdomain.com
