# GLaDOS Container — Example Configuration
#
# Stage 3 Phase 6 (2026-04-18): upstream service URLs are now managed
# through the WebUI and pydantic defaults, not this YAML.
#
# Same-stack defaults (apply automatically when you omit the URL):
#   Home Assistant:  http://homeassistant.local:8123    (mDNS)
#   Ollama:          http://ollama:11434                (docker service name)
#   speaches (TTS):  http://speaches:8800               (docker service name)
#   speaches (STT):  http://speaches:8800               (docker service name)
#   glados-vision:   http://glados-vision:8016          (docker service name)
#   ChromaDB:        http://chromadb:8000               (docker service name)
#
# Override priority:
#   1. env var (HA_URL, HA_TOKEN, OLLAMA_URL, SPEACHES_URL, VISION_URL,
#      CHROMADB_HOST, CHROMADB_PORT, etc.) — set via compose/.env
#   2. URL edited in the WebUI (Configuration → LLM & Services or
#      Integrations → Home Assistant) — persisted back to this YAML
#   3. Pydantic default (the same-stack values above)
#
# Copy this file to `config.yaml` and fill in at minimum the HA token.
# `config.yaml` is gitignored and will never be committed.

# ---------------------------------------------------------------------------
# Home Assistant — token is the only required field for HA integration.
# Leave `url` / `ws_url` unset to use the mDNS default, or set them to
# your HA IP if mDNS isn't available on your network.
# ---------------------------------------------------------------------------
home_assistant:
  token: "YOUR_LONG_LIVED_HA_TOKEN"
  # url: "http://192.168.1.104:8123"
  # ws_url: "ws://192.168.1.104:8123/api/websocket"

# ---------------------------------------------------------------------------
# WebUI authentication — set the password via:
#   docker exec glados python -m glados.tools.set_password
# ---------------------------------------------------------------------------
auth:
  enabled: true
  session_timeout_hours: 24

# ---------------------------------------------------------------------------
# Service-specific tunables (URLs intentionally omitted — see defaults
# above or use the WebUI). Keep only non-URL fields here.
# ---------------------------------------------------------------------------
services:
  tts:
    voice: "glados"
    model: "hexgrad/Kokoro-82M"
  stt:
    model: "Systran/faster-whisper-small"

# ---------------------------------------------------------------------------
# Discord (optional — leave empty to disable)
# ---------------------------------------------------------------------------
discord:
  bot_token: ""
  active_channels: []
  alert_channel: ""
  allowed_user_ids: []

# ---------------------------------------------------------------------------
# NOTE — fields intentionally NOT shown in this example:
#   services.*.url           — use defaults or WebUI
#   network.serve_host/port  — env-driven (SERVE_HOST / SERVE_PORT), deprecated
#   paths.*                  — env-driven (GLADOS_ROOT etc.), deprecated
#   audit.path, .retention_days — env-driven / unimplemented, deprecated
#   weather.temperature_unit, .wind_speed_unit — moving to UI state, deprecated
#   services.gladys_api      — reserved endpoint with no consumers, deprecated
#
# All of the above continue to parse for backward compatibility but now
# emit a one-line WARNING at startup so you know to remove them.
# ---------------------------------------------------------------------------
