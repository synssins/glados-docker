# docker/compose.rocm.yml — AMD ROCm GPU override
# Usage: docker compose -f docker/compose.yml -f docker/compose.rocm.yml up -d
# Requires: ROCm drivers installed on host

services:
  ollama:
    image: ollama/ollama:rocm
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0   # adjust for your GPU

  speaches:
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
