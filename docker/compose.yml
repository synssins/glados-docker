# docker/compose.yml — GLaDOS, single container.
#
# The container is self-contained: TTS (local Piper), STT (local Parakeet),
# embeddings (BGE), and ChromaDB all run inside. The only external services
# you need are an LLM endpoint (any OpenAI-compatible — Ollama, OVMS,
# llama-server, vLLM, …) and optionally Home Assistant + a vision service.
#
# Required env (.env or shell):
#   OLLAMA_URL    LLM endpoint                                e.g. http://host.docker.internal:11434
#                 (named for legacy reasons — anything OpenAI-compat works)
#   HA_URL        Home Assistant base URL          (optional) e.g. http://host.docker.internal:8123
#   HA_TOKEN      Home Assistant long-lived token  (optional, paired with HA_URL)
#
# Optional env:
#   TZ                       Container system clock TZ; default UTC.
#                            (Time-of-day INJECTION uses the IANA zone from your
#                             weather coordinates instead — TZ only affects log timestamps.)
#   OLLAMA_AUTONOMY_URL      Override autonomy / disambiguator / rewriter endpoint
#   OLLAMA_VISION_URL        Override vision endpoint
#   VISION_URL               External vision service (e.g. http://host.docker.internal:8016)
#   GLADOS_INTERNAL_API_PORT Loopback-only plain-HTTP port for in-container callers (default 18015)
#   GLADOS_PLUGINS_ENABLED   MCP plugin runtime master toggle (default true)
#   GLADOS_AUTH_BYPASS       Set to 1 only for recovery — disables ALL auth checks
#   WEBUI_HTTP_REDIRECT_PORT If set, listen on this port and 301-redirect HTTP → HTTPS
#   GLADOS_DOCKER_GID        Host's docker group GID (enables WebUI Logs page; see comment below)
#
# Usage:
#   cp ../.env.example ../.env       # edit values
#   docker compose -f docker/compose.yml up -d
#
# To build from source instead of pulling :latest, uncomment the build: block
# and comment out the image: line.

services:
  glados:
    image: ghcr.io/synssins/glados-docker:latest
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    container_name: glados
    ports:
      - "8015:8015"   # OpenAI-compatible API (TLS when cert mounted, plain HTTP otherwise)
      - "8052:8052"   # Admin WebUI (TLS when cert mounted, plain HTTP otherwise)
      - "5051:5051"   # HA audio file server — serves WAV / startup announcements for media_player.play_media
    volumes:
      - glados_configs:/app/configs    # YAML config — first run creates defaults
      - glados_data:/app/data          # ChromaDB + plugins + conversation history + semantic memory
      - glados_audio:/app/audio_files  # TTS-generated audio + chimes
      - glados_logs:/app/logs          # audit JSONL + service logs + per-plugin stderr
      - glados_certs:/app/certs        # Let's Encrypt cert/key (auto-managed) or operator uploads
      # Optional: read-only docker socket for the WebUI Logs page to tail
      # the GLaDOS container's own stdout. Comment out if you don't need it.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ:-UTC}
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"   # required on Linux Docker; harmless on Desktop
    # Grant access to the host's docker group for the Logs page (optional).
    # On Linux:  getent group docker | cut -d: -f3
    group_add:
      - "${GLADOS_DOCKER_GID:-0}"
    # Watchtower exclusion. Without this label, watchtower's hourly pull
    # of `:latest` from GHCR will silently overwrite a `_local_deploy.py`
    # build with whatever's published — operators iterating locally will
    # see their changes vanish on the next watchtower cycle. Safe to
    # leave on every install; if you don't run watchtower it's a no-op.
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    restart: unless-stopped

volumes:
  glados_configs:
  glados_data:
  glados_audio:
  glados_logs:
  glados_certs:
