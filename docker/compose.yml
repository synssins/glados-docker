# docker/compose.yml — GLaDOS + ChromaDB only.
#
# This compose ships two services:
#   - glados:   the persona middleware container (this repo's build)
#   - chromadb: GLaDOS's vector memory store (single-consumer — part of GLaDOS)
#
# Everything else is an EXTERNAL dependency the operator runs separately
# and points GLaDOS at via env vars:
#
#   OLLAMA_URL       — LLM inference (interactive)         default 11434
#   OLLAMA_AUTONOMY_URL — LLM inference (background tasks) default 11436
#   OLLAMA_VISION_URL — vision LLM (optional)              default 11435
#   SPEACHES_URL     — STT + TTS                           default 8800
#   HA_URL + HA_TOKEN — Home Assistant
#   VISION_URL       — GLaDOS vision service (optional)    default 8016
#
# See .env.example for the complete list.
#
# Usage:
#   cp ../.env.example ../.env        # edit to match your environment
#   cp ../configs/config.example.yaml ../configs/config.yaml
#   docker compose -f docker/compose.yml up -d

services:

  glados:
    build:
      context: ..
      dockerfile: Dockerfile
    image: glados:latest
    container_name: glados
    ports:
      - "8015:8015"   # OpenAI-compatible persona API
      - "8052:8052"   # Admin WebUI (config editor, health, TTS generator, chat)
    volumes:
      - ../configs/config.yaml:/app/configs/config.yaml:ro
      - glados_data:/app/data
      - glados_audio:/app/audio_files
      - glados_logs:/app/logs
      - glados_certs:/app/certs
    environment:
      - GLADOS_CONFIG=/app/configs/config.yaml
    env_file:
      - ../.env
    # host.docker.internal must resolve for outbound calls to host-native
    # Ollama / speaches / HA. On Linux Docker this requires the extra_hosts
    # block below; Docker Desktop (Mac/Windows) resolves it natively.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - glados_net

  chromadb:
    image: chromadb/chroma:latest
    container_name: glados_chromadb
    # Bound to localhost only — ChromaDB has no consumer outside GLaDOS.
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - glados_net

networks:
  glados_net:
    driver: bridge

volumes:
  glados_data:
  glados_audio:
  glados_logs:
  glados_certs:
  chromadb_data:
